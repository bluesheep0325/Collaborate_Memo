services:
  - type: web
    name: collaborate-memo
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: ROOM_PASSWORD
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
